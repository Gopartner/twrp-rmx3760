name: Build TWRP for Realme C53 (RMX3760)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: twrp-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device/realme/RE58C2

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
            libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python3-pip python3-venv libc6-dev-i386 \
            libgmp-dev libmpc-dev libmpfr-dev repo
          sudo apt-get install -y -qq openjdk-11-jdk || true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: twrp-${{ github.sha }}
          max-size: 5G

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache
          df -h

      - name: Initialize TWRP minimal manifest
        run: |
          repo init --depth=1 \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b twrp-12.1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync 2>&1

      - name: Build TWRP (NO graphics_drm patch - testing stock atomic)
        run: |
          export CCACHE_DIR=/tmp/ccache
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          source build/envsetup.sh
          lunch twrp_RE58C2-eng
          make -j$(nproc --all) vendorbootimage 2>&1

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: twrp-rmx3760
          path: out/target/product/RE58C2/vendor_boot.img
          if-no-files-found: error
